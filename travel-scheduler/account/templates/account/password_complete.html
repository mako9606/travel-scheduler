{% extends "base.html" %}
{% load static %}

{% block title %}
    home
{% endblock %}

{% block css %}
    <link rel="stylesheet" href="{% static 'layout.css' %}">
    <link rel="stylesheet" href="{% static 'account/password_complete.css' %}?v=1">
{% endblock %}

{% block header %}
    {% include "header.html" with header_title="パスワード再設定" %}
{% endblock %}

{% block content %}
    
    <div class="modal-overlay">
        <div class="modal-box">

            <!-- × ボタン（ログイン画面へ） -->

            <p class="modal-message">
                パスワードの<br>再設定が完了しました。
            </p>

        </div>
    </div>

{% endblock %}
