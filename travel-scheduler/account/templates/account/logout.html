<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ログアウト画面</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'layout.css' %}?v=1">
    <link rel="stylesheet" href="{% static 'account/logout.css' %}?v=1">

</head>

<body>
    <div class="modal-overlay">
        <div class="page-title">アカウント</div>
            
        <div class="form-container modal-box">

            <p class="modal-message"> ログアウトしますか？</p>
            
            <div class="logout-actions">
                <form method="POST" action="{% url 'account:logout_execute' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">
                        ログアウト
                    </button>
                </form>    

            <a href="{% url 'account:account' %}" class="btn-cancel">戻る</a>

        </div>
        
    </div>
</body>
