{% extends "base.html" %}
{% load static %}

{% block title %}
    home
{% endblock %}

{% block css %}
    <link rel="stylesheet" href="{% static 'layout.css' %}">
    <link rel="stylesheet" href="{% static 'account/password_reset.css' %}?v=3">
{% endblock %}

{% block header %}
    {% include "header.html" with header_title="パスワードを忘れた場合" %}
{% endblock %}

{% block content %}
    <form method="POST" class="password-reset-form">
        {% csrf_token %}

        <div class="password-reset-field">
            <label for="id_email">パスワード再設定のURLを送ります。<br>メールアドレスを入力してください。</label>
            <input
                type="email"
                name="email"
                id="id_email"
                placeholder="メールアドレス 入力"
                required
            >
        </div>

        <div class="password-reset-actions">
            <button type="submit" class="btn">送信</button>
        </div>
    </form>
{% endblock %}
