<head>
<!-- 画面設計図　スライド22 -->
    <title>地点登録画面</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'destinations/map_destination.css' %}">
</head>

<body>

    <div class="page-title"></div>

    <form method="POST" class="form-container">
        {% csrf_token %}

        <input type="text" name="q" placeholder="目的地名 入力" value="{{ q }}">
        <button type="submit" class="search-btn">検索</button>


        <p>ピン選択</P>
        {% for pin in pins %}
            <a href="{% url 'destinations:map_destination' destination.id %}?pin_id={{ pin.id }}">
                {{ pin.name }}
            </a>
        {% endfor %}


        <p>選択中のピン</p>
        {% if selected_pin %}
            <div>
                {{ selected_pin.name }}
            </div>
        {% else %}
             <p>まだピンが選択されていません</p>
        {% endif %}

        <a href="{% url 'destinations:map_pin_edit' destination.id %}"
            class="edit-btn">
                ピン編集
        </a>
        <button type="submit" class="btn">登録</button>
        <input type="hidden" name="lat" value="{{ lat }}">
        <input type="hidden" name="lng" value="{{ lng }}">

    </form>

    <div id="map" style="height:400px;"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzTxW_yYKsF1KuCOYGslVvoIpwaVifXIY"></script>

    <script>
        function initMap() {
            const defaultLocation = { lat: 35.681236, lng: 139.767125 };

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: defaultLocation,
            });

            let marker = null;

            const savedLat = {{ destination.latitude|default:"null" }};
            const savedLng = {{ destination.longitude|default:"null" }};

            if (savedLat !== null && savedLng !== null && !isNaN(savedLat) && !isNaN(savedLng)) {
                const savedLocation = {
                    lat: parseFloat(savedLat),
                    lng: parseFloat(savedLng)
                };

                marker = new google.maps.Marker({
                    position: savedLocation,
                    map: map,
                });

                map.setCenter(savedLocation);
            }


            map.addListener("click", function(event) {

                if (marker) {
                    marker.setMap(null);
                }

                marker = new google.maps.Marker({
                    position: event.latLng,
                    map: map,
                });

                document.querySelector('input[name="lat"]').value = event.latLng.lat();
                document.querySelector('input[name="lng"]').value = event.latLng.lng();
            });
        }

        window.onload = initMap;
    </script>
</body>
