<head>

<title>ホーム画面</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'auth_app/home.css' %}">

</head>

<body>
    <div class="login-title" class="form-container" >home</div>

    <p>
        <a href="{% url 'plans:plan_list' %}">
            プランリストへ（仮）
        </a>
    </p>

    <p>is_authenticated: {{ request.user.is_authenticated }}</p>
    <p>user: {{ request.user }}</p>


    <h2>ショートカット</h2>
    <div class="swipe-wrap">
        <div class="swipe-track">

            <!-- 左ページ -->
            <section class="page">
                <iframe
                    src="{{ left_shortcut.url }}"
                    class="shortcut-frame">
                </iframe>
            </section>

            <!-- 右ページ -->
            <section class="page">
                <h2>右</h2>
                {% if right_shortcut %}
                    <iframe
                        src="{{ right_shortcut.url }}"
                        class="shortcut-frame">
                    </iframe>
                {% else %}
                    <div class="empty-page">
                        未選択です
                    </div>
                {% endif %}
            </section>

        </div>
    </div>

</body>
