<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>費用　削除　画面</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'layout.css' %}?v=2">
    <link rel="stylesheet" href="{% static 'plans/plan_cost_delete.css' %}?v=3">

</head>

<body>
    <div class="modal-overlay">
        <div class="page-title">{{ plan.plan_name }}</div>
    
        <div class="form-container modal-box">

            <p class="modal-message"> "{{ cost.name }}"を削除しますか？</p>
            
            <div class="delete-actions">
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn-delete">
                        削除
                    </button>
                </form>    

                <a href="{% url 'plans:plan_detail' plan.id %}?cost_tab=1" class="btn-cancel">戻る</a>
            </div>

        </div>
    </div>
</body>
