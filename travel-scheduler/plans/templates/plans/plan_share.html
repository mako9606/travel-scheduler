<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共有URL閲覧画面</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'layout.css' %}?v=5">
    <link rel="stylesheet" href="{% static 'plans/plan_share.css' %}?v=5">
</head>

<body>

    <!-- 有効期限内　-->
    {% if is_valid %}
    <div class="container">
    <div class="page-title">{{ plan.plan_name }}</div>

    <div class="share-container is-valid">

        <form method="POST" class="form-container">
            {% csrf_token %}

            {% if error_message %}
                <p class="error-message">{{ error_message }}</p>
            {% endif %}
        
            <h1>☆☆旅行を閲覧しますか？</h1>

            <label class="section-label">アカウント ログイン</label>

            <label class="field-label">メールアドレス</label>
            <input type="email" name="email" placeholder="メールアドレス 入力">
            
            <label class="field-label">パスワード</label>
            <div class="password-input-wrap">
                <input type="password" id="share_password" name="password" placeholder="パスワード　入力">
                <button type="button" class="toggle-password" data-target="share_password"></button>
            </div>

            <div class="login-action-row">
                <button type="submit" name="action" value="login" class="btn">ログインして閲覧</button>
                <a href="{% url 'account:password_reset' %}?share_token={{ member.token }}" class="forgot">パスワード忘れた方</a>
            </div>

            <label class="section-label">アカウント お持ちじゃない方</label>

            <label class="field-label">アカウント名</label>
            <input type="text" name="username" placeholder="アカウント名 入力">

            <button type="submit" name="action" value="view" class="btn">閲覧</button>

        </form>
    </div>
    </div>
    <!-- 有効期限外　-->
    {% else %}
        
        <div class="container">
        <div class="page-title">{{ plan.plan_name }}</div>

        <div class="share-container is-invalid">

            <div class="form-container invalid-container">
                <h1>URLの有効期限が<br>切れています。</h1>
                <h2>送信者から新しいURLを<br>受け取ってください。</h2>
            </div>
        </div>
        </div>
    {% endif %}

    <script>
        const eyeOpenIcon = `
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"
                    fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"
                    fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        `;

        const eyeClosedIcon = `
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"
                    fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"
                    fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M4 20L20 4"
                    fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round"/>
            </svg>
        `;

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.innerHTML = eyeOpenIcon;
            btn.setAttribute('aria-label', 'パスワードを表示');

            btn.addEventListener('click', (event) => {
                event.preventDefault();

                const input = document.getElementById(btn.dataset.target);

                if (!input) {
                    return;
                }

                if (input.type === 'password') {
                    input.type = 'text';
                    btn.innerHTML = eyeClosedIcon;
                    btn.setAttribute('aria-label', 'パスワードを非表示');
                } else {
                    input.type = 'password';
                    btn.innerHTML = eyeOpenIcon;
                    btn.setAttribute('aria-label', 'パスワードを表示');
                }
            });
        });
    </script>
</body>
